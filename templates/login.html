{% extends 'base.html' %}

{% block title %}Login | WanderSync{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block nav_actions %}
<!-- Navigation hidden on auth form, replaced with card bottom button -->
{% endblock %}

{% block content %}
<div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="auth-container glass-card" style="margin: 0;">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Log in or register to sync your travels.</p>

        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Log In</button>
            <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Register</button>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="input-group hidden" id="name-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div class="input-group hidden" id="confirm-pwd-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" placeholder="••••••••">
            </div>

            <p id="auth-error" class="error-text hidden"></p>
            <p id="auth-success" class="success-text hidden"></p>

            <button type="submit" class="btn btn-primary btn-full" id="auth-submit-btn">Continue</button>
        </form>
        <a href="/home" class="btn btn-secondary btn-full" style="margin-top: 1.5rem; border-color: rgba(255,255,255,0.2);">← Back to Home</a>
    </div>
</div>
{% endblock %}
