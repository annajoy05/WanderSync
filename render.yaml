services:
  - type: web
    name: wandersync
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false # User will provide this in the Render dashboard or it's already there
      - key: SECRET_KEY
        generateValue: true # Securely generated by Render
      - key: SAMBANOVA_API_KEY
        sync: false # User will provide this in the Render dashboard
